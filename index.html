<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Mini TFT - RELEASE</title>

<style>
body{
margin:0;
overflow:hidden;
background:#050510;
font-family:Arial;
color:white;
touch-action:none;
}

canvas{display:block;background:#0e0e18;}

/* UI */
#ui{
position:fixed;
top:10px;
left:10px;
z-index:10;
}

button{
margin:3px;
padding:7px 10px;
background:#222;
color:white;
border:1px solid #444;
cursor:pointer;
}

/* INFO */
#info{
position:fixed;
top:10px;
right:10px;
font-size:13px;
}

/* SHOP */
#shop{
position:fixed;
bottom:10px;
left:10px;
display:flex;
gap:8px;
}

.card{
width:60px;height:60px;
background:#2a2a2a;
display:flex;
align-items:center;
justify-content:center;
border:1px solid #555;
cursor:pointer;
font-size:18px;
}

/* OVER */
#over{
position:fixed;
top:0;left:0;
width:100%;height:100%;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
background:rgba(0,0,0,0.85);
z-index:50;
}
</style>
</head>

<body>

<div id="ui">
<button onclick="startBattle()">BATTLE</button>
<button onclick="startPrepare()">PREPARE</button>
<button onclick="saveGame()">SAVE</button>
<button onclick="loadGame()">LOAD</button>
</div>

<div id="info">
GOLD:<span id="gold"></span> |
LV:<span id="lv"></span> |
ROUND:<span id="round"></span> |
STATE:<span id="state"></span>
</div>

<div id="shop"></div>
<canvas id="c"></canvas>

<div id="over">
<h1 id="result"></h1>
<button onclick="restart()">RESTART</button>
</div>

<script>

/* ================= CANVAS ================= */
const c=document.getElementById("c");
const ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

/* ================= STATE ================= */
let state="menu";
let gold=10,lv=1,round=1;

/* ================= ENTITIES ================= */
let board=[];
let enemies=[];
let dragging=null;

/* ================= UNIT DATABASE ================= */

const UNITS={

warrior:{
id:"warrior",
name:"검사",
icon:"⚔️",
cost:1,
hp:100,
atk:12,
range:45,
role:"fighter"
},

tank:{
id:"tank",
name:"기사",
icon:"🛡️",
cost:1,
hp:180,
atk:7,
range:35,
role:"tank"
},

mage:{
id:"mage",
name:"마법사",
icon:"🔥",
cost:2,
hp:70,
atk:20,
range:140,
role:"mage"
},

archer:{
id:"archer",
name:"궁수",
icon:"🏹",
cost:2,
hp:80,
atk:15,
range:170,
role:"ranged"
}

};

const pool=[
UNITS.warrior,
UNITS.tank,
UNITS.mage,
UNITS.archer
];

/* ================= UNIT ================= */
function Unit(data){

this.id=data.id;
this.name=data.name;
this.icon=data.icon;

this.hp=data.hp;
this.maxhp=data.hp;

this.atk=data.atk;

this.range=data.range;

this.role=data.role;

this.star=1;

this.level=1;

this.cost=data.cost;

this.x=0;
this.y=0;

this.cool=0;

}

/* ================= ENEMY ================= */
function Enemy(){
this.x=Math.random()*c.width;
this.y=Math.random()*c.height/2;
this.hp=60+round*8;
this.maxhp=this.hp;
this.alive=true;
}

/* ================= SHOP ================= */
function renderShop(){
let s=document.getElementById("shop");
s.innerHTML="";

for(let i=0;i<3;i++){
let t=pool[Math.floor(Math.random()*pool.length)];

let d=document.createElement("div");
d.className="card";
d.innerHTML=`
<div style="font-size:24px">${t.icon}</div>
<div style="font-size:11px">${t.name}</div>
<div style="color:gold">${t.cost}G</div>
`;

d.onclick=()=>{
if(gold<3)return;

let u=new Unit(t);
u.x=innerWidth/2;
u.y=innerHeight/2;

board.push(u);
gold-=3;
renderShop();
};

s.appendChild(d);
}
}

/* ================= FLOW ================= */
function startPrepare(){
state="prepare";
renderShop();
}

function startBattle(){
state="battle";
enemies=[];
for(let i=0;i<5;i++)enemies.push(new Enemy());
}

/* ================= SAVE / LOAD ================= */
function saveGame(){
localStorage.setItem("tft",JSON.stringify({
gold,lv,round,board
}));
}

function loadGame(){
let d=JSON.parse(localStorage.getItem("tft"));
if(!d)return;

gold=d.gold;
lv=d.lv;
round=d.round;
board=d.board;
}

/* ================= DRAG ================= */
function get(e){
return e.touches?
{x:e.touches[0].clientX,y:e.touches[0].clientY}
:{x:e.clientX,y:e.clientY};
}

c.addEventListener("mousedown",e=>{
let p=get(e);
for(let u of board){
if(Math.hypot(u.x-p.x,u.y-p.y)<18)dragging=u;
}
});

c.addEventListener("mousemove",e=>{
if(dragging){
let p=get(e);
dragging.x=p.x;
dragging.y=p.y;
}
});

c.addEventListener("mouseup",()=>dragging=null);

/* ================= MERGE ================= */
function merge(){
for(let i=0;i<board.length;i++){
for(let j=i+1;j<board.length;j++){
if(board[i]&&board[j]&&board[i].type===board[j].type){
board[i].hp*=1.4;
board[i].atk*=1.4;
board.splice(j,1);
return;
}
}
}
}

/* ================= AI ================= */
function unitAI(u){

if(state!=="battle")return;

let t=null,min=9999;

for(let e of enemies){
if(!e.alive)continue;

let d=Math.hypot(e.x-u.x,e.y-u.y);
if(d<min){min=d;t=e;}
}

if(!t)return;

let dx=t.x-u.x;
let dy=t.y-u.y;
let d=Math.hypot(dx,dy);

if(d<u.range){
t.hp-=u.atk*0.05;
}else{
u.x+=dx/d*1.2;
u.y+=dy/d*1.2;
}
}

function enemyAI(e){

let t=null,min=9999;

for(let u of board){
let d=Math.hypot(u.x-e.x,u.y-e.y);
if(d<min){min=d;t=u;}
}

if(!t)return;

let dx=t.x-e.x;
let dy=t.y-e.y;
let d=Math.hypot(dx,dy);

if(d>20){
e.x+=dx/d;
e.y+=dy/d;
}else{
t.hp-=0.5;
}
}

/* ================= GAME LOOP ================= */
function update(){

if(state==="prepare")merge();

if(state==="battle"){

for(let u of board)unitAI(u);
for(let e of enemies){
if(e.hp<=0)e.alive=false;
enemyAI(e);
}

if(enemies.every(e=>!e.alive)){
round++;
gold+=5;
state="prepare";
renderShop();
}
}
}

/* ================= DRAW ================= */
function draw(){
ctx.clearRect(0,0,c.width,c.height);

for(let u of board){
ctx.beginPath();
ctx.fillStyle="#66ff99";
ctx.arc(u.x,u.y,13,0,Math.PI*2);
ctx.fill();
}

for(let e of enemies){
if(!e.alive)continue;
ctx.beginPath();
ctx.fillStyle="red";
ctx.arc(e.x,e.y,13,0,Math.PI*2);
ctx.fill();
}
}

/* ================= LOOP ================= */
function loop(){

draw();
update();

document.getElementById("gold").innerText=gold;
document.getElementById("lv").innerText=lv;
document.getElementById("round").innerText=round;
document.getElementById("state").innerText=state;

requestAnimationFrame(loop);
}

renderShop();
loop();

</script>

</body>
</html>
