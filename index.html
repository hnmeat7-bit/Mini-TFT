<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Mini TFT Synergy</title>

<style>
body{margin:0;overflow:hidden;background:#0b0b12;font-family:Arial;color:white;}
canvas{background:#111;display:block;}

#ui{position:fixed;top:10px;left:10px;z-index:10;}
button{margin:4px;padding:8px;background:#222;color:white;border:1px solid #444;cursor:pointer;}

#shop{position:fixed;bottom:10px;left:10px;display:flex;gap:8px;}
.card{width:60px;height:60px;background:#2a2a2a;display:flex;align-items:center;justify-content:center;border:1px solid #555;cursor:pointer;font-size:18px;}

#info{position:fixed;top:10px;right:10px;}
</style>
</head>

<body>

<div id="ui">
<button onclick="startBattle()">BATTLE</button>
<button onclick="startPrepare()">PREPARE</button>
<button onclick="nextRound()">NEXT</button>
</div>

<div id="info">
골드: <span id="gold">10</span> |
라운드: <span id="round">1</span> |
상태: <span id="state">prepare</span>
</div>

<canvas id="c"></canvas>
<div id="shop"></div>

<script>

const c=document.getElementById("c");
const ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

/* ======================
   STATE
====================== */

let state="prepare";
let gold=10;
let round=1;

/* ======================
   ENTITIES
====================== */

let bench=[];
let board=[];
let enemies=[];

const pool=["⚔️","🛡️","🔥","🏹"];

/* ======================
   UNIT
====================== */

function Unit(type,tier=1){
this.type=type;
this.tier=tier;
this.hp=50*tier;
this.atk=5*tier;
this.range=70;
this.x=0;
this.y=0;
}

/* ======================
   ENEMY
====================== */

function Enemy(){
this.x=Math.random()*c.width;
this.y=Math.random()*c.height/2;
this.hp=40+round*10;
this.alive=true;
}

/* ======================
   SHOP
====================== */

function renderShop(){
let shop=document.getElementById("shop");
shop.innerHTML="";

for(let i=0;i<3;i++){
let t=pool[Math.floor(Math.random()*pool.length)];

let div=document.createElement("div");
div.className="card";
div.innerText=t;

div.onclick=()=>{
if(gold<3)return;
bench.push(new Unit(t,1));
gold-=3;
renderShop();
};

shop.appendChild(div);
}
}

/* ======================
   PLACE
====================== */

c.addEventListener("click",e=>{
if(state!=="prepare")return;

let u=bench.pop();
if(!u)return;

u.x=e.clientX;
u.y=e.clientY;

board.push(u);
});

/* ======================
   🔥 SYNERGY SYSTEM
====================== */

function applySynergy(){

let count={};

for(let u of board){
count[u.type]=(count[u.type]||0)+1;
}

// 3개 이상이면 버프
for(let u of board){
if(count[u.type]>=3){
u.atk*=1.02;
u.hp*=1.01;
}
}
}

/* ======================
   🔥 AUTO MERGE (2 → 3성)
====================== */

function autoMerge(){

// 3성까지 합성
for(let i=0;i<board.length;i++){
for(let j=i+1;j<board.length;j++){

if(!board[i]||!board[j])continue;

if(board[i].type===board[j].type && board[i].tier===board[j].tier){

board[i].tier++;

board[i].hp*=1.7;
board[i].atk*=1.7;

// 3성 제한 느낌
if(board[i].tier>3)board[i].tier=3;

board.splice(j,1);
return;
}
}
}
}

/* ======================
   AI
====================== */

function unitAI(u){

if(state!=="battle")return;

let target=null;
let min=9999;

for(let e of enemies){
if(!e.alive)continue;

let d=Math.hypot(e.x-u.x,e.y-u.y);
if(d<min){
min=d;
target=e;
}
}

if(!target)return;

let dx=target.x-u.x;
let dy=target.y-u.y;
let d=Math.hypot(dx,dy);

if(d<u.range){
target.hp-=u.atk;
}else{
u.x+=dx/d*1.2;
u.y+=dy/d*1.2;
}
}

function enemyAI(e){

let target=null;
let min=9999;

for(let u of board){
let d=Math.hypot(u.x-e.x,u.y-e.y);
if(d<min){
min=d;
target=u;
}
}

if(!target)return;

let dx=target.x-e.x;
let dy=target.y-e.y;
let d=Math.hypot(dx,dy);

if(d>20){
e.x+=dx/d;
e.y+=dy/d;
}else{
target.hp-=0.3;
}
}

/* ======================
   FLOW
====================== */

function startBattle(){
state="battle";

enemies=[];
for(let i=0;i<round+2;i++){
enemies.push(new Enemy());
}
}

function startPrepare(){
state="prepare";
renderShop();
}

function nextRound(){
round++;
gold+=5;
state="prepare";
renderShop();
}

/* ======================
   DRAW
====================== */

function draw(){

ctx.clearRect(0,0,c.width,c.height);

// grid
ctx.strokeStyle="#222";
for(let x=0;x<c.width;x+=80){
for(let y=0;y<c.height;y+=80){
ctx.strokeRect(x,y,80,80);
}
}

// units
for(let u of board){
ctx.fillStyle=u.tier===1?"cyan":u.tier===2?"lime":"gold";
ctx.fillRect(u.x,u.y,20,20);

ctx.fillStyle="white";
ctx.fillText(u.tier,u.x,u.y);
}

// enemies
ctx.fillStyle="red";
for(let e of enemies){
if(!e.alive)continue;
ctx.fillRect(e.x,e.y,20,20);
}
}

/* ======================
   UPDATE LOOP
====================== */

function update(){

// 🔥 자동 합성
if(state==="prepare"){
autoMerge();
applySynergy();
}

if(state==="battle"){

for(let u of board){
unitAI(u);
}

for(let e of enemies){
enemyAI(e);
if(e.hp<=0)e.alive=false;
}

// 승리
if(enemies.every(e=>!e.alive)){
state="prepare";
gold+=5;
renderShop();
}
}
}

/* ======================
   LOOP
====================== */

function loop(){

draw();
update();

document.getElementById("gold").innerText=gold;
document.getElementById("round").innerText=round;
document.getElementById("state").innerText=state;

requestAnimationFrame(loop);
}

renderShop();
loop();

</script>

</body>
</html>
